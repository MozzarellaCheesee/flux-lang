name: Build fluxc

on:
  push:
    tags:
      - "v*"          # запускается при git tag v0.1.0
  workflow_dispatch:  # ручной запуск

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-22.04
            name: linux-x86_64
            artifact: fluxc
            cmake_extra: ""

          - os: windows-2022
            name: windows-x86_64
            artifact: fluxc.exe
            cmake_extra: "-DLLVM_DIR=C:/LLVM/lib/cmake/llvm"

    runs-on: ${{ matrix.os }}

    steps:
      # ── 1. Исходники ──────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Установка LLVM ────────────────────────────────
      - name: Install LLVM (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y llvm-18-dev clang-18 cmake ninja-build

      - name: Install LLVM (Windows)
        if: runner.os == 'Windows'
        run: |
          choco install llvm --version=18.1.8 --force -y
          echo "LLVM_DIR=C:\Program Files\LLVM\lib\cmake\llvm" >> $env:GITHUB_ENV

      # ── 3. Сборка через CMake ────────────────────────────
      - name: Configure (Linux)
        if: runner.os == 'Linux'
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DLLVM_DIR=$(llvm-config-18 --cmakedir)

      - name: Configure (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cmake -B build -G "Visual Studio 17 2022" -A x64 `
            -DCMAKE_BUILD_TYPE=Release `
            -DLLVM_DIR="$env:LLVM_DIR"

      - name: Build
        run: cmake --build build --config Release -j4

      # ── 4. Копируем артефакт ─────────────────────────────
      - name: Collect binary (Linux)
        if: runner.os == 'Linux'
        run: cp build/fluxc fluxc-${{ matrix.name }}

      - name: Collect binary (Windows)
        if: runner.os == 'Windows'
        run: copy build\Release\fluxc.exe fluxc-${{ matrix.name }}.exe

      # ── 5. Загружаем в Release ────────────────────────────
      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            fluxc-${{ matrix.name }}*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
